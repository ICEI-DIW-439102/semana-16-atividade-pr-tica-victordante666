<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GameWiki - Detalhes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

  <nav class="navbar navbar-dark bg-dark px-4">
    <a href="index.html" class="navbar-brand fw-bold fs-4 text-decoration-none text-white">🎮 GameWiki</a>
  </nav>

  <section class="container my-5" id="info-geral"></section>

  <section class="container my-5">
    <h2 class="mb-4">🏷️ Tags</h2>
    <div id="lista-tags"></div>
  </section>

  <section class="container my-5" id="secao-editar" style="display:none;">
    <h2 class="mb-4">✏️ Editar Jogo</h2>
    <form id="form-editar-jogo" class="row g-3 bg-light p-4 rounded shadow-sm">
      <input type="hidden" id="edit-id">
      <div class="col-md-6">
        <label class="form-label">Título</label>
        <input type="text" class="form-control" id="edit-titulo" required>
      </div>
      <div class="col-md-6">
        <label class="form-label">Categoria</label>
        <input type="text" class="form-control" id="edit-categoria" required>
      </div>
      <div class="col-md-6">
        <label class="form-label">Desenvolvedora</label>
        <input type="text" class="form-control" id="edit-desenvolvedora" required>
      </div>
      <div class="col-md-3">
        <label class="form-label">Ano</label>
        <input type="number" class="form-control" id="edit-ano" required>
      </div>
      <div class="col-md-3">
        <label class="form-label">Preço (R$)</label>
        <input type="number" step="0.01" class="form-control" id="edit-preco" required>
      </div>
      <div class="col-12">
        <label class="form-label">Descrição Completa</label>
        <textarea class="form-control" id="edit-descricaoCompleta" rows="2" required></textarea>
      </div>
      <div class="col-12">
        <button type="submit" class="btn btn-primary">Salvar Alterações</button>
      </div>
    </form>
  </section>

  <footer class="bg-dark text-white text-center py-4 mt-4">
    <p class="mb-1"><strong>Desenvolvido por:</strong> Victor Dante Fonseca Oliveira</p>
    <p class="mb-1">Curso: Engenharia de Software — PUC Minas</p>
    <p class="mb-0 text-muted small">Semana 16 — 2025</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/scripts/detalhes.js"></script>
</body>
</html>
