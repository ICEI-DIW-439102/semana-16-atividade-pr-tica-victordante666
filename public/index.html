<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GameWiki</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

  <nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand fw-bold fs-4">🎮 GameWiki</span>
  </nav>

  <section class="container my-5">
    <h2 class="mb-3">🔥 Jogos em Destaque</h2>
    <div id="carrossel" class="carousel slide" data-bs-ride="carousel">
      <div class="carousel-inner" id="carousel-inner"></div>
      <button class="carousel-control-prev" type="button" data-bs-target="#carrossel" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
      </button>
      <button class="carousel-control-next" type="button" data-bs-target="#carrossel" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
      </button>
    </div>
  </section>

  <section class="container my-5">
    <h2 class="mb-4">➕ Adicionar Novo Jogo</h2>
    <form id="form-novo-jogo" class="row g-3 bg-light p-4 rounded shadow-sm">
      <div class="col-md-6">
        <label class="form-label">Título</label>
        <input type="text" class="form-control" id="titulo" required>
      </div>
      <div class="col-md-6">
        <label class="form-label">Categoria</label>
        <input type="text" class="form-control" id="categoria" required>
      </div>
      <div class="col-md-6">
        <label class="form-label">Desenvolvedora</label>
        <input type="text" class="form-control" id="desenvolvedora" required>
      </div>
      <div class="col-md-3">
        <label class="form-label">Ano</label>
        <input type="number" class="form-control" id="ano" required>
      </div>
      <div class="col-md-3">
        <label class="form-label">Preço (R$)</label>
        <input type="number" step="0.01" class="form-control" id="preco" required>
      </div>
      <div class="col-md-8">
        <label class="form-label">URL da Imagem</label>
        <input type="url" class="form-control" id="imagem" required>
      </div>
      <div class="col-md-4">
        <label class="form-label">Tags (separadas por vírgula)</label>
        <input type="text" class="form-control" id="tags" placeholder="ex: rpg, fantasia">
      </div>
      <div class="col-md-12">
        <label class="form-label">Descrição Curta</label>
        <input type="text" class="form-control" id="descricaoCurta" required>
      </div>
      <div class="col-md-12">
        <label class="form-label">Descrição Completa</label>
        <textarea class="form-control" id="descricaoCompleta" rows="2" required></textarea>
      </div>
      <div class="col-md-4 d-flex align-items-center">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="destaque">
          <label class="form-check-label" for="destaque">Exibir em destaque</label>
        </div>
      </div>
      <div class="col-12">
        <button type="submit" class="btn btn-success">Adicionar Jogo</button>
      </div>
    </form>
  </section>

  <section class="container my-5">
    <h2 class="mb-4">🕹️ Todos os Jogos</h2>
    <div id="lista-jogos" class="row"></div>
  </section>

  <footer class="bg-dark text-white text-center py-4 mt-4">
    <p class="mb-1"><strong>Desenvolvido por:</strong> Victor Dante Fonseca Oliveira</p>
    <p class="mb-1">Curso: Engenharia de Software — PUC Minas</p>
    <p class="mb-0 text-muted small">Semana 16 — 2025</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/scripts/app.js"></script>
</body>
</html>
